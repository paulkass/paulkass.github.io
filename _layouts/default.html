<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <nav class="site-nav" aria-label="Primary navigation">
    <div class="site-nav-inner">
      <div class="nav-primary">
        <a href="{{ '/' | relative_url }}" class="{% if page.url == '/' %}active{% endif %}">Bio</a>
      </div>
      <div class="nav-external">
        <a href="https://www.linkedin.com/in/paul-kassianik/" target="_blank" rel="noopener">LinkedIn</a>
        <a href="https://github.com/paulkass" target="_blank" rel="noopener">GitHub</a>
        <a href="https://x.com/kass_paul" target="_blank" rel="noopener">X</a>
        <a href="https://scholar.google.com/citations?user=qQCpQQwAAAAJ&hl=en" target="_blank" rel="noopener">Scholar</a>
      </div>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <span>// {{ site.title }} &middot; {{ 'now' | date: '%Y' }}</span>
  </footer>

</body>
</html>
