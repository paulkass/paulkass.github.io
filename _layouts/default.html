<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <nav class="site-nav" aria-label="Section navigation">
    <div class="site-nav-inner">
      <a href="#about">About</a>
      <a href="#experience">Experience</a>
      <a href="#selected-publications">Publications</a>
      <a href="#patents">Patents</a>
      <a href="#open-source">Open Source</a>
      <a href="#writing">Writing</a>
      <a href="#links">Links</a>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <span>// {{ site.title }} &middot; {{ 'now' | date: '%Y' }}</span>
  </footer>

  <script>
    (function () {
      var headings = document.querySelectorAll('main h2[id]');
      var navLinks = document.querySelectorAll('.site-nav a');
      if (!headings.length || !navLinks.length || !('IntersectionObserver' in window)) return;
      var linkById = {};
      navLinks.forEach(function (a) {
        linkById[a.getAttribute('href').slice(1)] = a;
      });
      var observer = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            navLinks.forEach(function (a) { a.classList.remove('active'); });
            var link = linkById[entry.target.id];
            if (link) link.classList.add('active');
          }
        });
      }, { rootMargin: '-20% 0px -70% 0px', threshold: 0 });
      headings.forEach(function (h) { observer.observe(h); });
    })();
  </script>
</body>
</html>
